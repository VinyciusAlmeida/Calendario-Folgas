<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <title>Calendário de Folgas - Produção</title>
    <meta name="description" content="Calendário de escala 6x2 para 2026. Consulte suas folgas e feriados de forma rápida e offline.">
    <meta name="theme-color" content="#007bff">
    <style>
    :root {
        --primary: #007bff;
        --success: #2ecc71;
        --danger: #e74c3c;
        --bg: #f4f7f6;
        --card-bg: #ffffff;
        --text: #2c3e50;
        --shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        text-rendering: optimizeSpeed;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .app-container {
        width: 100%;
        max-width: 420px;
    }

    h1 {
        margin: 20px 0;
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(45deg, var(--primary), #0056b3);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
    }

    .painel-grupos {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 25px;
        width: 100%;
    }

    .grupo-card {
        padding: 15px;
        border-radius: 16px;
        background: var(--card-bg);
        border: 2px solid transparent;
        box-shadow: var(--shadow);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
    }

    .grupo-card h3 {
        font-size: 1rem;
        color: #555;
    }

    .grupo-card.ativo {
        border-color: var(--primary);
        background-color: #fff;
        transform: translateY(-5px);
        box-shadow: 0 12px 20px rgba(0, 123, 255, 0.15);
    }

    .grupo-card.ativo h3 {
        color: var(--primary);
    }

    .calendario-container {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 24px;
        box-shadow: var(--shadow);
        width: 100%;
    }

    .calendario-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .calendario-header h2 {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text);
    }

    .calendario-header button {
        background: #f0f2f5;
        color: var(--text);
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .calendario-header button:hover {
        background: var(--primary);
        color: white;
    }

    #calendarioGrade {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        margin-top: 10px;
    }

    .dia-semana {
        font-weight: 700;
        color: #adb5bd;
        font-size: 0.7rem;
        padding-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .dia {
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8f9fa;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        transition: 0.2s;
    }

    .dia-folga {
        background: var(--success) !important;
        color: white !important;
        box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4);
    }

    .dia-feriado {
        background: var(--danger) !important;
        color: white !important;
        box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
    }

    .dia-hoje {
        box-shadow: inset 0 0 0 2px var(--primary);
        color: var(--primary);
    }

    .dia-vazio {
        background: transparent;
    }

    .rodape {
        margin-top: 40px;
        font-size: 0.9rem;
        color: #999;
    }

    .toast-aviso {
        position: fixed;
        bottom: -100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(44, 62, 80, 0.95);
        color: white;
        padding: 12px 25px;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 500;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        z-index: 2000;
        white-space: nowrap;
    }

    .toast-aviso.show {
        bottom: 30px;
    }

    .navbar-areas {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    background: #e9ecef;
    padding: 5px;
    border-radius: 12px;
    margin-bottom: 20px;
    width: 100%;
    }

    .nav-btn {
        flex: 1;
        padding: 10px 5px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: #666;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .nav-btn.ativo {
        background: var(--card-bg);
        color: var(--primary);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .painel-grupos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 25px;
    width: 100%;
    }
    .feriados-container {
        margin: 20px auto;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        border: 1px solid #e0e0e0;
        max-width: 95%;
    }

    .feriados-header {
        background: #f8f9fa;
        padding: 15px 20px;
        border-bottom: 1px solid #eee;
    }

    .feriados-header h3 {
        margin: 0;
        font-size: 1.1rem;
        color: #333;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .tabela-scroll {
        overflow-x: hidden; 
        width: 100%;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 0;
        table-layout: fixed;
    }

    th {
        background-color: #ffffff;
        color: #666;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 0.5px;
        padding: 12px 10px;
        text-align: left;
        border-bottom: 2px solid #f0f0f0;
    }

    th:nth-child(1), td:nth-child(1) { width: 25%; }
    th:nth-child(2), td:nth-child(2) { width: 45%; }
    th:nth-child(3), td:nth-child(3) { width: 30%; }

    td {
        padding: 12px 10px;
        font-size: 0.85rem;
        color: #444;
        border-bottom: 1px solid #f9f9f9;
        word-wrap: break-word;
    }

    tr:hover td {
        background-color: #fcfcfc;
    }

    .tag-setor {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.65rem;
        font-weight: 700;
        text-align: center;
        width: 100%;
    }

    .tag-setor.geral {
        background-color: #e3f2fd;
        color: #1565c0;
        border: 1px solid #bbdefb;
    }

    .tag-setor.especifico {
        background-color: #f3e5f5;
        color: #7b1fa2;
        border: 1px solid #e1bee7;
    }

    td strong {
        color: #2c3e50;
        font-family: 'Courier New', Courier, monospace;
    }
    </style>
</head>
<body>
    <div class="app-container">
        <main>
            <nav class="navbar-areas">
                <button class="nav-btn ativo" data-area="producao">Produção</button>
                <button class="nav-btn" data-area="manutencao">Manutenção</button>
                <button class="nav-btn" data-area="eletrica">Elétrica</button>
            </nav>
            <h1>Calendário de Folgas <span id="setorNome"><br>Produção</span></h1>
            
            <section class="painel-grupos" id="containerGrupos" aria-label="Seleção de Grupos"></section>
            
            <section class="calendario-container" aria-label="Calendário Mensal">
                <div class="calendario-header">
                    <button id="btnAnterior" aria-label="Mês Anterior">&lt;</button>
                    <h2 id="mesAtual">Fevereiro 2026</h2>
                    <button id="btnProximo" aria-label="Próximo Mês">&gt;</button>
                </div>
                <div class="calendario-grade" id="calendarioGrade"></div>
            </section>
            
            <div id="toastAlerta" class="toast-aviso" role="alert" aria-live="polite">
                <span id="toastMensagem"></span>
            </div>

            <div class="feriados-container">
            <div class="feriados-header">
                <h3>📌 Legenda de Feriados </h3>
            </div>
                <div class="tabela-scroll">
                    <table id="tabelaFeriados">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Feriado</th>
                                <th>Abrangência</th>
                            </tr>
                        </thead>
                    <tbody id="corpoTabelaFeriados"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer class="rodape">
            <p>Criado por <strong>Vinycius Almeida</strong></p>
        </footer>
    </div>

    <script src="js/calculadora.js?v=2.9" defer></script>
    <script src="js/feriados.js?v=2.9" defer></script>
    <script src="js/main.js?v=2.9" defer></script>
</body>
</html>
